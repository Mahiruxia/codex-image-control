name: verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            plugins/image-control/app/package-lock.json
            plugins/image-control/server/package-lock.json
      - name: Install locked dependencies
        run: npm run install:all
      - name: Verify, audit, and build reproducible release
        run: npm run package:windows
      - name: Confirm generated runtime is committed
        run: git diff --exit-code
      - name: Upload verified release candidates
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-control-windows-x64
          path: |
            artifacts/image-control-*-windows-x64.zip
            artifacts/image-control-*-windows-x64.zip.sha256
            artifacts/image-control-*-sbom.cdx.json
            artifacts/image-control-*-third-party-components.json
          if-no-files-found: error
          retention-days: 14

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
