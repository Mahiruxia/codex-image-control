version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore

  - package-ecosystem: npm
    directory: /plugins/image-control/app
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      app-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: deps

  - package-ecosystem: npm
    directory: /plugins/image-control/server
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      server-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: deps
